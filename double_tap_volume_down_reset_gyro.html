<!DOCTYPE html>
<html lang="zh-CN" style="background:transparent">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android VR 重置陀螺仪动画演示</title>
    <style>
        :root {
            --phone-bg: #282828;
            --screen-black: #000000;
            --accent-color: #00e5ff;
            --click-flash-color: #ff3b30;
            --guide-cycle-duration: 3.2s;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 响应式包装容器：占满 WebView 视口，并在内部居中缩放舞台 */
        .stage-wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 动画舞台：保持设计尺寸，由 JS 按视口宽高缩放并居中 */
        .stage {
            position: absolute;
            width: 650px;
            height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            left: 50%;
            top: 50%;
            transform-origin: center center;
        }

        /* 正向横屏手机 */
        .phone {
            position: relative;
            width: 580px;
            height: 270px;
            background-color: var(--phone-bg);
            border-radius: 40px;
            border: 4px solid #3a3a3a;
            padding: 14px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* 手机音量键（横屏顶端偏左：左边是+，右边是-） */
        .volume-buttons {
            position: absolute;
            top: -8px;
            left: 100px;
            display: flex;
            gap: 6px;
        }

        .vol-btn {
            width: 45px;
            height: 8px;
            background-color: #444;
            border-radius: 4px 4px 0 0;
        }

        /* 【动画 1】音量- 键（右侧按键）自动双击变色 */
        .vol-minus {
            animation: volMinusClickAnimation var(--guide-cycle-duration) infinite ease-in-out;
            will-change: background-color;
        }

        /* 指示箭头 */
        /* 【动画 2】箭头精准指向音量-键（向右偏移对应像素）并下压 */
        .arrow {
            position: absolute;
            top: -65px;
            left: 161px;
            width: 24px;
            height: 35px;
            background-color: var(--click-flash-color);
            border-radius: 2px;
            z-index: 10;
            animation: arrowClickAnimation var(--guide-cycle-duration) infinite ease-in-out;
            will-change: transform, opacity;
        }

        .arrow::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: -8px;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 16px solid var(--click-flash-color);
        }

        /* 手机屏幕区域 */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--screen-black);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            transform: translateZ(0);
        }

        /* --- VR 双屏显示层 --- */
        .vr-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            background-color: #000;
        }

        .vr-eye {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 分屏中线 */
        .vr-eye:first-child::after {
            content: '';
            position: absolute;
            right: 0;
            top: 10%;
            width: 2px;
            height: 80%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* VR 镜片圆形视野 */
        .vr-lens {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 75%);
            border: 3px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        /* 【动画 3】陀螺仪核心：VR 内部画面及方块从倾斜过渡到回正 */
        .gyro-view {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            animation: gyroResetAnimation var(--guide-cycle-duration) infinite cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        /* 镜片内模拟的3D空间方块 */
        .vr-cube {
            width: 35px;
            height: 35px;
            border: 2px solid var(--accent-color);
            background-color: rgba(0, 229, 255, 0.15);
            transform: rotateX(45deg) rotateY(15deg);
            transition: border-color 0.3s;
        }

        /* 底部提示文字 */
        .hint-text {
            margin-top: 18px;
            color: #ffffff;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
            line-height: 1.3;
            padding: 0 16px;
            box-sizing: border-box;
        }


        /* =============================
           CSS TIMELINE (全套动画核心时间轴)
           总时长：3.2秒循环一次
           ============================= */

        /* 1. 箭头移向音量-键并执行双击 */
        @keyframes arrowClickAnimation {
            0%, 8%     { transform: translateY(-15px); opacity: 0; }
            14%        { transform: translateY(0); opacity: 1; }     /* 移到音量-键上方 */
            /* 第一次点击 */
            18%        { transform: translateY(5px); }
            25%        { transform: translateY(0); }
            /* 第二次点击 (双击完成) */
            32%        { transform: translateY(5px); }
            39%        { transform: translateY(0); opacity: 1; }
            55%, 100%  { transform: translateY(-15px); opacity: 0; } /* 撤离 */
        }

        /* 2. 音量- 键配合双击节奏变色高亮 */
        @keyframes volMinusClickAnimation {
            0%, 17%    { background-color: #444; }
            18%, 25%   { background-color: var(--click-flash-color); } /* 响应第一击 */
            26%, 31%   { background-color: #444; }
            32%, 39%   { background-color: var(--click-flash-color); } /* 响应第二击并生效 */
            40%, 100%  { background-color: #444; }
        }

        /* 3. 陀螺仪画面回正动画 */
        /* 双击在 32%-39% 完成，39% 时视界开始迅速回正 */
        @keyframes gyroResetAnimation {
            0%, 39%    { transform: rotate(-22deg); }
            50%        { transform: rotate(2deg); }
            58%        { transform: rotate(0deg); }
            86%        { transform: rotate(0deg); }
            100%       { transform: rotate(-22deg); }
        }
    </style>
</head>
<body>

    <div class="stage-wrapper">
        <div class="stage">
            <!-- 手机硬件 -->
            <div class="phone">
                <!-- 顶端音量键组合（左边加，右边减） -->
                <div class="volume-buttons">
                    <div class="vol-btn vol-plus"></div>
                    <div class="vol-btn vol-minus"></div>
                </div>

                <!-- 动作指示箭头 -->
                <div class="arrow"></div>

                <!-- 手机屏幕 -->
                <div class="screen">
                    <!-- VR 双屏应用界面 -->
                    <div class="vr-layer">
                        <!-- 左眼视野 -->
                        <div class="vr-eye">
                            <!-- 受陀螺仪动画控制的旋转外壳 -->
                            <div class="gyro-view">
                                <div class="vr-lens">
                                    <div class="vr-cube"></div>
                                </div>
                            </div>
                        </div>
                        <!-- 右眼视野 -->
                        <div class="vr-eye">
                            <!-- 受陀螺仪动画控制的旋转外壳 -->
                            <div class="gyro-view">
                                <div class="vr-lens">
                                    <div class="vr-cube"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 说明文字 -->
            <div class="hint-text">{{HINT_TEXT}}</div>
        </div>
    </div>

    <script>
        // 动态缩放舞台以适应响应式包装器
        (function() {
            var wrapper = document.querySelector('.stage-wrapper');
            var stage = document.querySelector('.stage');

            function updateScale() {
                var scale = Math.min(wrapper.clientWidth / 650, wrapper.clientHeight / 380);
                stage.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
            }

            window.addEventListener('resize', updateScale);
            if (window.ResizeObserver) {
                new ResizeObserver(updateScale).observe(wrapper);
            }
            updateScale();
        })();

        function setHintText(text) {
            var el = document.querySelector('.hint-text');
            if (el) el.textContent = text;
        }
    </script>

</body>
</html>
