<!DOCTYPE html>
<html lang="zh-CN" style="background:transparent">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android VR 退出完全动画演示</title>
    <style>
        :root {
            --phone-bg: #282828;
            --screen-black: #000000;
            --accent-color: #ff3b30;
            --android-blue: #1976D2;
            --guide-cycle-duration: 3.2s;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 响应式包装容器：占满 WebView 视口，并在内部居中缩放舞台 */
        .stage-wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 动画舞台：保持设计尺寸，由 JS 按视口宽高缩放并居中 */
        .stage {
            position: absolute;
            width: 650px;
            height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            left: 50%;
            top: 50%;
            transform-origin: center center;
        }

        /* 1. 正向横屏手机，无任何 3D 倾斜 */
        .phone {
            position: relative;
            width: 580px;
            height: 270px;
            background-color: var(--phone-bg);
            border-radius: 40px;
            border: 4px solid #3a3a3a;
            padding: 14px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* 手机音量键（横屏顶端偏左） */
        .volume-buttons {
            position: absolute;
            top: -8px;
            left: 100px;
            display: flex;
            gap: 6px;
        }

        .vol-btn {
            width: 45px;
            height: 8px;
            background-color: #444;
            border-radius: 4px 4px 0 0;
        }

        /* 【动画 1】音量+ 键自动双击变色 */
        .vol-plus {
            animation: volClickAnimation var(--guide-cycle-duration) infinite ease-in-out;
            will-change: background-color;
        }

        /* 指示箭头 */
        /* 【动画 2】箭头精准双击指向 */
        .arrow {
            position: absolute;
            top: -65px;
            left: 110px;
            width: 24px;
            height: 35px;
            background-color: var(--accent-color);
            border-radius: 2px;
            z-index: 10;
            animation: arrowClickAnimation var(--guide-cycle-duration) infinite ease-in-out;
            will-change: transform, opacity;
        }

        .arrow::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: -8px;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 16px solid var(--accent-color);
        }

        /* 手机屏幕区域 */
        .screen {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--screen-black);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
            transform: translateZ(0);
        }

        /* --- 2. VR 双屏显示画面 --- */
        /* 【动画 3】VR 画面双击后缩小消失 */
        .vr-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            background-color: #000;
            z-index: 2;
            animation: vrExitAnimation var(--guide-cycle-duration) infinite ease-in-out;
            will-change: transform, opacity, filter;
        }

        .vr-eye {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 分屏中线 */
        .vr-eye:first-child::after {
            content: '';
            position: absolute;
            right: 0;
            top: 10%;
            width: 2px;
            height: 80%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* VR 镜片圆形视野 */
        .vr-lens {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 75%);
            border: 3px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(44, 62, 80, 0.5);
        }

        /* 镜片内模拟的3D空间方块 */
        .vr-cube {
            width: 35px;
            height: 35px;
            border: 2px solid #00d2ff;
            background-color: rgba(0, 210, 255, 0.1);
            transform: rotateX(45deg) rotateY(45deg);
        }

        /* --- 手机主屏幕系统桌面 --- */
        /* 【动画 4】主屏桌面淡入显现 */
        .home-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            z-index: 1;
            box-sizing: border-box;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            animation: homeEnterAnimation var(--guide-cycle-duration) infinite ease-in-out;
            will-change: transform, opacity;
        }

        /* 顶部状态栏 */
        .status-bar {
            position: absolute;
            top: 6px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.8);
            font-size: 11px;
        }

        /* 桌面应用图标排列 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            padding: 0 20px 10px 20px;
        }

        .app-icon {
            height: 40px;
            width: 40px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            justify-self: center;
        }
        .icon-a { background: #4285F4; }
        .icon-b { background: #34A853; }
        .icon-c { background: #FBBC05; }
        .icon-d { background: #EA4335; }
        .icon-e { background: #7B1FA2; }
        .icon-f { background: #00ACC1; }

        /* 底部提示文字 */
        .hint-text {
            margin-top: 18px;
            color: #ffffff;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
            line-height: 1.3;
            padding: 0 16px;
            box-sizing: border-box;
        }


        /* =============================
           CSS TIMELINE (全套动画核心时间轴)
           总时长：3.2秒循环一次
           ============================= */

        /* 1. 箭头双击动作 */
        @keyframes arrowClickAnimation {
            0%, 8%     { transform: translateY(-15px); opacity: 0; }
            14%        { transform: translateY(0); opacity: 1; }     /* 移到按钮上方准备 */
            /* 第一次点击 */
            18%        { transform: translateY(5px); }
            25%        { transform: translateY(0); }
            /* 第二次点击 (双击完成) */
            32%        { transform: translateY(5px); }
            39%        { transform: translateY(0); opacity: 1; }
            55%, 100%  { transform: translateY(-15px); opacity: 0; } /* 撤离 */
        }

        /* 2. 音量键被按压高亮 */
        @keyframes volClickAnimation {
            0%, 17%    { background-color: #444; }
            18%, 25%   { background-color: var(--accent-color); } /* 响应一击 */
            26%, 31%   { background-color: #444; }
            32%, 39%   { background-color: var(--accent-color); } /* 响应二击 */
            40%, 100%  { background-color: #444; }
        }

        /* 3. VR画面退出 (双击发生在 32%-39% 之间，39% 后开始收起) */
        @keyframes vrExitAnimation {
            0%, 39%    { transform: scale(1); opacity: 1; filter: blur(0); }
            52%        { transform: scale(0.5); opacity: 0; filter: blur(8px); } /* 收起脱离 */
            82%        { transform: scale(0.5); opacity: 0; } /* 保持隐藏 */
            92%, 100%  { transform: scale(1); opacity: 1; filter: blur(0); }    /* 重新载入App进入下一次循环 */
        }

        /* 4. 手机主界面显现 */
        @keyframes homeEnterAnimation {
            0%, 39%    { opacity: 0; transform: scale(1.05); } /* 在VR图层下隐藏，并微微放大 */
            52%, 82%   { opacity: 1; transform: scale(1); }    /* 切入并保持可见 */
            90%, 100%  { opacity: 0; }                         /* 准备重新进入VR */
        }
    </style>
</head>
<body>

    <div class="stage-wrapper">
        <div class="stage">
            <!-- 手机硬件 -->
            <div class="phone">
                <!-- 顶端音量键组合 -->
                <div class="volume-buttons">
                    <div class="vol-btn vol-plus"></div>
                    <div class="vol-btn"></div>
                </div>

                <!-- 动作指示箭头 -->
                <div class="arrow"></div>

                <!-- 屏幕视图 -->
                <div class="screen">

                    <!-- 【第一层】VR 双屏应用界面 -->
                    <div class="vr-layer">
                        <div class="vr-eye">
                            <div class="vr-lens"><div class="vr-cube"></div></div>
                        </div>
                        <div class="vr-eye">
                            <div class="vr-lens"><div class="vr-cube"></div></div>
                        </div>
                    </div>

                    <!-- 【第二层】Android 系统主屏桌面 -->
                    <div class="home-layer">
                        <div class="status-bar">
                            <span>10:00</span>
                            <span>📶 🪫 99%</span>
                        </div>
                        <div class="app-grid">
                            <div class="app-icon icon-a"></div>
                            <div class="app-icon icon-b"></div>
                            <div class="app-icon icon-c"></div>
                            <div class="app-icon icon-d"></div>
                            <div class="app-icon icon-e"></div>
                            <div class="app-icon icon-f"></div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 说明文字 -->
            <div class="hint-text">{{HINT_TEXT}}</div>
        </div>
    </div>

    <script>
        // 动态缩放舞台以适应响应式包装器
        (function() {
            var wrapper = document.querySelector('.stage-wrapper');
            var stage = document.querySelector('.stage');

            function updateScale() {
                var scale = Math.min(wrapper.clientWidth / 650, wrapper.clientHeight / 380);
                stage.style.transform = 'translate(-50%, -50%) scale(' + scale + ')';
            }

            window.addEventListener('resize', updateScale);
            if (window.ResizeObserver) {
                new ResizeObserver(updateScale).observe(wrapper);
            }
            updateScale();
        })();

        function setHintText(text) {
            var el = document.querySelector('.hint-text');
            if (el) el.textContent = text;
        }
    </script>

</body>
</html>
